reproduce_command: |
  # Install dependencies
  pip install -r requirements.txt

  # Run structured ranking (no ML packages needed)
  python rank.py \
    --candidates ./candidates.jsonl \
    --output ./team_code_liberators.csv \
    --verbose

  # Validate
  python ../challenge_data/validate_submission.py team_code_liberators.csv

  # (Optional) Precompute embeddings for hybrid pipeline
  python precompute.py \
    --candidates ./candidates.jsonl \
    --output-dir ./precomputed

  # (Optional) Run hybrid pipeline
  python rank_advanced.py \
    --candidates ./candidates.jsonl \
    --precomputed-dir ./precomputed \
    --output ./team_code_liberators_hybrid.csv \
    --use-semantic --verbose

  # Start API sandbox
  uvicorn src.api.main:app --port 8000 --reload

  # Start frontend dashboard
  cd frontend && npm install && npm run dev
