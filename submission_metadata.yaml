methodology_summary: |
  Three-stage hybrid ranking pipeline:

  Stage 1 — Structured Feature Extraction (100K candidates, ~50 seconds):
    - TitleMatcher: Hierarchical taxonomy (ideal/strong/moderate/poor/mismatch) scoring
    - CareerAnalyzer: Product-vs-services detection, job hopping penalty, tenure scoring
    - SkillAnalyzer: Quality-weighted scoring (endorsements × duration × proficiency)
    - BehavioralScorer: Open-to-work, notice period, recruiter response rate, recency
    - HoneypotDetector: 8 independent checks with progressive penalty

  Stage 2 — Weighted Ensemble Scoring:
    - Weights: Title 0.30, Career 0.20, Skills 0.20, YOE 0.15, Education 0.05, Semantic 0.10
    - Behavioral multiplier B(c) ∈ [0.7, 1.1] calibrates final score
    - Honeypot penalty H(c) ∈ [0, 1] suppresses flagged candidates
    - Final: score = B(c) × H(c) × (w1×T + w2×C + w3×S + w4×Y + w5×E + w6×Sem)

  Stage 3 — Template-Based Reasoning:
    - Score-derived, grounded, specific, varied (20+ patterns)
    - No hallucination: facts drawn only from scored features
    - Grammar-correct singular/plural handling

